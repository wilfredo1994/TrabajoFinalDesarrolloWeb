<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrador | Insight School</title>
<link rel="icon" href="img/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="row g-0">
      <div class="col-lg-5 login-side">
        <div class="crest-pattern"></div>
        <div class="position-relative">
          <img src="img/logo.png" alt="Logo Insight School" style="height:70px;" class="mb-4">
          <h3 class="font-display">Panel Administrativo</h3>
          <p class="opacity-90">Accede para gestionar programas, docentes y mensajes recibidos a través del sitio web institucional.</p>
          <a href="index.html" class="text-white small mt-4 d-inline-flex align-items-center gap-2"><i class="bi bi-arrow-left"></i> Volver al sitio</a>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="p-4 p-md-5">
          <span class="eyebrow">Bienvenido</span>
          <h2 class="font-display mt-2 mb-4">Inicia sesión</h2>
          <div id="alertaLogin"></div>
          <form id="formLogin">
            <div class="mb-3">
              <label class="form-label" for="loginUsuario">Usuario</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="loginUsuario" placeholder="admin" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label" for="loginClave">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="loginClave" placeholder="••••••" required>
              </div>
            </div>
            <button type="submit" class="btn-marca w-100"><i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</button>
          </form>
          <p class="text-secondary small mt-4 mb-0"><i class="bi bi-info-circle me-1"></i>Credenciales de prueba: <strong>admin</strong> / <strong>123456</strong></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
